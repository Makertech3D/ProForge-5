############################################################################
######################## ProForge 5 Printer Config #########################
############################################################################

#config file version v1.0.0
#release date: 17.03.2026

[include mainsail.cfg]
[include macros.cfg]
[include calibrate-offsets.cfg]

[include eddy.cfg]

#[include so3_0.cfg]
#[include so3_1.cfg]
#[include so3_2.cfg]
#[include so3_3.cfg]
#[include so3_4.cfg]

#[include enclosure.cfg]

[save_variables]
filename: ~/printer_data/config/variables.cfg
#   Required - provide a filename that would be used to save the
#   variables to disk e.g. ~/variables.cfg
[virtual_sdcard]
path: ~/printer_data/gcodes

[force_move]
enable_force_move: True

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_OctopusPro-if00

[exclude_object]

[printer]
kinematics: corexy
max_velocity: 500
max_accel: 20000
minimum_cruise_ratio: 0.6
square_corner_velocity: 8.0
max_z_velocity: 15
max_z_accel: 100

[gcode_arcs]
resolution: 0.1


# MOTOR-1
[stepper_x]
enable_pin: !PF14
step_pin: PF13
dir_pin: !PF12
rotation_distance: 40  # Adjust based on your lead screw or belt system
microsteps: 32
full_steps_per_rotation: 200  # Motor step angle: 1.8° = 200 steps per rotation
#gear_ratio: 1
#step_pulse_duration: 2  # Add if the driver requires a specific pulse width
endstop_pin: ^PG6
position_min: -120
position_endstop: 500
position_max: 500
homing_speed: 100  # mm/s; adjust for your mechanics
homing_retract_speed: 25  # mm/s
[tmc5160 stepper_x]
cs_pin: PC4
spi_bus: spi1
#spi_speed: 2000000
#spi_software_sclk_pin: PA5
#spi_software_mosi_pin: PA7
#spi_software_miso_pin: PA6
interpolate: True
run_current: 2.2  # Adjusted for 2.5A motor rating (approximately 85-90% for safety)
hold_current: 1.0  # Reduce for lower heat generation during idle
sense_resistor: 0.075
stealthchop_threshold: 0  # Disabled for better torque and stability on X-axis
# Driver Tuning
#driver_TBL: 1
#driver_TOFF: 3
#driver_PWM_OFS: 30
#driver_PWM_GRAD: 4
#driver_HSTRT: 7
#driver_HEND: 5



# MOTOR-2
[stepper_y]
enable_pin: !PF15
step_pin: PG0
dir_pin: !PG1
rotation_distance: 40  # Adjust based on your belt/pulley system
microsteps: 32
full_steps_per_rotation: 200  # Motor step angle: 1.8° = 200 steps per rotation
#gear_ratio: 1
#step_pulse_duration: 2  # Add if the driver requires a specific pulse width
endstop_pin: ^PG9
position_min: -20
position_endstop: 427
position_max: 427
homing_speed: 100  # mm/s; adjust if necessary for your mechanics
homing_retract_speed: 25  # mm/s
[tmc5160 stepper_y]
cs_pin: PD11
spi_bus: spi1
interpolate: True
run_current: 2.2  # Adjusted to ~85-90% of the motor's rated 2.5A for safe operation
hold_current: 1.0  # Reduced for less heat generation during idle
sense_resistor: 0.075
stealthchop_threshold: 0  # Disabled to keep torque consistent for the Y-axis
# Driver Tuning
#driver_TBL: 1
#driver_TOFF: 3
#driver_PWM_OFS: 30
#driver_PWM_GRAD: 4
#driver_HSTRT: 7
#driver_HEND: 5







# MOTOR-5 (Z0 Front Left)
[stepper_z]
enable_pin: !PG2
step_pin: PF9
dir_pin: !PF10
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_max: 500
position_min: -3.5
[tmc2209 stepper_z]
uart_pin: PF2
run_current: 1.1
sense_resistor: 0.11
stealthchop_threshold: 999999
interpolate: True           # Enables interpolation for smoother movement
hold_current: 0.4           # Sets a lower current when idle to reduce heat

# MOTOR-6 (Z1 Rear Left)
[stepper_z1]
enable_pin: !PF1
step_pin: PC13
dir_pin: !PF0
microsteps: 16
rotation_distance: 8
[tmc2209 stepper_z1]
uart_pin: PE4
run_current: 1.1
sense_resistor: 0.11
stealthchop_threshold: 999999
interpolate: True           # Enables interpolation for smoother movement
hold_current: 0.4           # Sets a lower current when idle to reduce heat

# MOTOR-7 (Z2 Rear Right)
[stepper_z2]
enable_pin: !PD4
step_pin: PE2
dir_pin: PE3
microsteps: 16
rotation_distance: 8
[tmc2209 stepper_z2]
uart_pin: PE1
run_current: 1.1
sense_resistor: 0.11
stealthchop_threshold: 999999
interpolate: True           # Enables interpolation for smoother movement
hold_current: 0.4           # Sets a lower current when idle to reduce heat

# MOTOR-8 (Z3 Front Right)
[stepper_z3]
enable_pin: !PE0
step_pin: PE6
dir_pin: PA14
microsteps: 16
rotation_distance: 8
[tmc2209 stepper_z3]
uart_pin: PD3
run_current: 1.1
sense_resistor: 0.11
stealthchop_threshold: 999999
interpolate: True           # Enables interpolation for smoother movement
hold_current: 0.4           # Sets a lower current when idle to reduce heat



[heater_bed]
heater_pin: PD15
sensor_type: Generic 3950
sensor_pin: PF3
control: pid
pid_Kp: 64.083
pid_Ki: 3.338
pid_Kd: 307.600
min_temp: 0
max_temp: 120

[fan]
pin: PB6                          # PWM Signal Pin
max_power: 0.9
hardware_pwm: True
cycle_time: 0.00004               # 25kHz
shutdown_speed: 0
kick_start_time: 0.2


[z_tilt]
z_positions:
 -60, -33.75
 -60, 476.25
 560, 476.25
 560, -33.75
points:
 3.8, 18.75
 3.8, 338.75
 423.8, 338.75
 423.8, 18.75
speed: 300
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.5

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
    _Z_TILT_ADJUST horizontal_move_z=5 retry_tolerance=1
    {% endif %}
    _Z_TILT_ADJUST horizontal_move_z=2
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT


[servo toolchanger]
pin: PE11
maximum_servo_angle: 180
minimum_pulse_width: 0.0005
maximum_pulse_width: 0.0025

[gcode_button carriage_tool_sensor]
pin: ^PG11
press_gcode:
release_gcode:

[respond]
default_type: echo

[neopixel Case_Light]
pin: PB10
chain_count: 48
color_order: RGB
initial_RED:   0.1   # dim red idle glow
initial_GREEN: 0
initial_BLUE:  0

