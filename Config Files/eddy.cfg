
############################################################################
######################### ProForge 5 Eddy Config ###########################
############################################################################

#config file version v1.0.0
#release date: 17.03.2026

[mcu eddy]
serial: /dev/serial/by-id/usb-Klipper_rp2040_Eddy-if00 
restart_method: command

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 36.6
y_offset: 21.25
tap_adjust_z: 0.05

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

[safe_z_home]
home_xy_position: 250, 200
z_hop: 10
z_hop_speed: 25
speed: 200

[bed_mesh]
horizontal_move_z: 2
speed: 150
mesh_min: 40, 40  # If the probe cannot reach then you will get a klipper error when trying to scan a bed mesh.
mesh_max: 460, 360 # If the probe cannot reach then you will get a klipper error when trying to scan a bed mesh.
probe_count: 25, 20
algorithm: bicubic
#scan_overshoot: 8
adaptive_margin: 5
zero_reference_position: 250, 200
fade_start: 1
fade_end: 10

[gcode_macro BED_MESH_SCAN]
gcode:
  _CHOME
  Z_TILT_ADJUST
  BED_MESH_CALIBRATE METHOD=rapid_scan ADAPTIVE=1 ADAPTIVE_MARGIN=50
  G90
  G1 Z15 F600       ; Lower bed 

[gcode_macro _BED_MESH_SCAN_ALL]
gcode:
  _CHOME
  Z_TILT_ADJUST
  BED_MESH_CALIBRATE METHOD=rapid_scan ADAPTIVE=0
  G90
  G1 Z15 F600       ; Lower bed 

[gcode_macro TAP]
gcode:
  PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0
  G28 Z
  PROBE_EDDY_NG_TAP




